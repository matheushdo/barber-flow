<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin - Barber Flow</title>

    <link rel="stylesheet" href="admin.css">

</head>


<body>


<header class="header">

    <h1>
        💈 Barber Flow
    </h1>

    <p>
        Painel Administrativo
    </p>

</header>



<main class="container">

    <!-- GRÁFICO DE SERVIÇOS -->

<section class="card">

    <h2>
        Serviços mais realizados
    </h2>


    <div class="grafico-container">

    <canvas id="graficoServicos"></canvas>

</div>


</section>

    <!-- Preparação DASHBOARDS -->

    <section class="dashboard">


    <div class="dashboard-card">

        <h3>
            Clientes
        </h3>

        <p id="totalClientes">
            0
        </p>

    </div>



    <div class="dashboard-card">

        <h3>
            Serviços
        </h3>

        <p id="totalServicos">
            0
        </p>

    </div>



    <div class="dashboard-card">

        <h3>
            Faturamento
        </h3>

        <p id="faturamento">
            R$ 0
        </p>

    </div>


</section>



    <!-- CLIENTES -->

    <section class="card">


        <h2>
            Clientes
        </h2>



        <form id="formCliente">


            <input 
            type="text" 
            id="nome"
            placeholder="Nome do cliente"
            >



            <input 
            type="text" 
            id="telefone"
            placeholder="Telefone"
            >



            <button type="submit">
                Cadastrar
            </button>



        </form>



        <div id="listaClientes">

        </div>



    </section>




    <!-- SERVIÇOS -->


    <section class="card">


        <h2>
            Serviços
        </h2>



        <div id="listaServicos">

        </div>



    </section>



</main>


<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="admin.js"></script>


</body>

</html>
